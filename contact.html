
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ช่องทางติดต่อ - คณะบริหารธุรกิจ Portfolio</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Sarabun', sans-serif; }
        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #bcd8ee 0%, #d9ebf7 35%, #f2f8fc 70%, #ffffff 100%);
            position: relative;
            color: #1c2e40;
            perspective: 1000px;
        }

        /* --- ธีมหลักเดิม (ตึก, หิมะ, ไอคอนหมุน) --- */
        .skyscraper-bg { position: fixed; bottom: 0; left: 0; width: 100%; height: 85vh; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="none"><path d="M0,800 L0,480 L60,480 L60,320 L130,320 L130,510 L190,510 L190,210 L290,210 L290,580 L350,580 L350,390 L420,390 L420,250 L510,250 L510,540 L590,540 L590,310 L670,310 L670,160 L780,160 L780,510 L850,510 L850,360 L940,360 L940,220 L1030,220 L1030,550 L1110,550 L1110,310 L1200,310 L1200,800 Z" fill="rgba(30, 77, 123, 0.02)"/><path d="M100,800 L100,550 L180,550 L180,420 L250,420 L250,650 L320,650 L320,310 L410,310 L410,610 L490,610 L490,420 L570,420 L570,290 L680,290 L680,590 L750,590 L750,410 L820,410 L820,280 L930,280 L930,590 Z" fill="rgba(30, 77, 123, 0.015)"/></svg>'); background-size: 100% 100%; background-repeat: no-repeat; background-position: bottom center; z-index: 1; pointer-events: none; opacity: 0.9; mask-image: linear-gradient(to top, rgba(0,0,0,1) 15%, rgba(0,0,0,0) 100%); }
        #snow-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        .premium-symbol { position: fixed; z-index: 3; color: rgba(30, 77, 123, 0.12); pointer-events: none; animation: spinAndFloat 8s infinite linear; }
        .sym-1 { top: 18%; left: 8%; font-size: 3.5rem; } .sym-2 { top: 25%; right: 10%; font-size: 3rem; } .sym-3 { bottom: 20%; left: 6%; font-size: 4rem; }
        @keyframes spinAndFloat { 0% { transform: translateY(0px) rotateY(0deg); } 50% { transform: translateY(-15px) rotateY(180deg); color: rgba(30, 77, 123, 0.18); } 100% { transform: translateY(0px) rotateY(360deg); } }

        /* --- Layout --- */
        .container { position: relative; z-index: 10; width: 90%; max-width: 900px; margin: 120px auto 40px auto; }
        .contact-wrapper { background: rgba(255, 255, 255, 0.82); backdrop-filter: blur(15px); border: 1px solid rgba(28, 46, 64, 0.08); border-radius: 20px; padding: 50px; box-shadow: 0 20px 50px rgba(30, 77, 123, 0.12); display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }

        .section-title { font-size: 28px; color: #1e4d7b; margin-bottom: 25px; }
        .contact-info p { margin-bottom: 20px; color: #3a5169; display: flex; align-items: center; gap: 15px; }
        .contact-info i { color: #1e4d7b; width: 25px; }

        /* Form Styling */
        .form-group { margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid rgba(30, 77, 123, 0.2); border-radius: 8px; background: rgba(255,255,255,0.5); outline: none; transition: 0.3s; }
        input:focus, textarea:focus { border-color: #1e4d7b; background: #fff; }
        .btn-submit { background: #1e4d7b; color: #fff; padding: 12px 30px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn-submit:hover { background: #163a5f; }

        @media (max-width: 768px) { .contact-wrapper { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="skyscraper-bg"></div>
    <div class="premium-symbol sym-1">฿</div>
    <div class="premium-symbol sym-2">📈</div>
    <div class="premium-symbol sym-3">$</div>
    <canvas id="snow-canvas"></canvas>

    <nav style="position:fixed; top:0; width:100%; padding:20px 50px; display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.75); backdrop-filter:blur(10px); z-index:100;">
        <div class="logo" style="font-weight:bold; color:#1e4d7b;">Business Portfolio</div>
        <ul style="display:flex; list-style:none; gap:30px;">
            <li><a href="index.html" style="text-decoration:none; color:#3a5169;">หน้าแรก</a></li>
            <li><a href="personal.html" style="text-decoration:none; color:#3a5169;">ประวัติส่วนตัว</a></li>
            <li><a href="education.html" style="text-decoration:none; color:#3a5169;">ประวัติการศึกษา</a></li>
            <li><a href="activities.html" style="text-decoration:none; color:#3a5169;">กิจกรรม/ผลงาน</a></li>
            <li><a href="contact.html" style="text-decoration:none; color:#1e4d7b; font-weight:bold;">ช่องทางติดต่อ</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="contact-wrapper">
            <div class="contact-info">
                <h2 class="section-title">Get In Touch</h2>
                <p>ยินดีรับฟังทุกข้อเสนอแนะและโอกาสในการร่วมงาน</p>
                <p><i class="fas fa-envelope"></i> your-email@example.com</p>
                <p><i class="fas fa-phone"></i> 0xx-xxx-xxxx</p>
                <p><i class="fab fa-line"></i> Line ID: @yourid</p>
            </div>
            <form>
                <div class="form-group"><input type="text" placeholder="ชื่อของคุณ"></div>
                <div class="form-group"><input type="email" placeholder="อีเมลของคุณ"></div>
                <div class="form-group"><textarea rows="5" placeholder="ข้อความถึงฉัน..."></textarea></div>
                <button type="submit" class="btn-submit">ส่งข้อความ</button>
            </form>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        window.addEventListener('resize', () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; });
        const flakes = Array.from({length: 50}, () => ({ x: Math.random() * width, y: Math.random() * height, r: Math.random() * 2 + 1, speedY: Math.random() * 0.5 + 0.2, opacity: Math.random() * 0.3 + 0.1 }));
        function draw() {
            ctx.clearRect(0, 0, width, height);
            flakes.forEach(f => {
                ctx.beginPath(); ctx.fillStyle = `rgba(30, 77, 123, ${f.opacity})`; ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2); ctx.fill();
                f.y += f.speedY; if (f.y > height) f.y = -10;
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
